version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: taftech_postgres
    restart: always
    environment:
      POSTGRES_DB: taftech_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root  # À changer en production !
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: