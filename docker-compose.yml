version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: taftech_postgres
    restart: always
    environment:
      POSTGRES_DB: taftech_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"  # <-- C'EST ICI QU'ON CHANGE ! (5433 sur ton PC vers 5432 dans le conteneur)
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: