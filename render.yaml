services:
  - type: web
    name: taftech-backend
    runtime: python
    buildCommand: "pip install -r taftech_backend/requirements.txt && cd taftech_backend && python manage.py migrate"
    startCommand: "cd taftech_backend && gunicorn taftech_backend.wsgi:application"
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taftech-db
          property: connectionString

databases:
  - name: taftech-db
    plan: free
