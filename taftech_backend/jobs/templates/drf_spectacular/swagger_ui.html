<!DOCTYPE html>
<html lang="fr">
  <head>
    {% block head %}
    <title>{{ title|default:"TafTech API" }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%234f46e5'/%3E%3Ctext x='12' y='17' font-family='Arial,sans-serif' font-size='13' font-weight='700' fill='white' text-anchor='middle'%3ET%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ swagger_ui_css }}">
    <style>
      html { box-sizing: border-box; overflow-y: scroll; }
      *, *:after, *:before { box-sizing: inherit; }
      :root {
        --tt-indigo: #4f46e5;
        --tt-indigo-dark: #4338ca;
        --tt-violet: #7c3aed;
        --tt-slate-900: #0f172a;
        --tt-slate-700: #334155;
        --tt-slate-500: #64748b;
        --tt-slate-200: #e2e8f0;
        --tt-slate-50: #f8fafc;
      }
      body {
        background: var(--tt-slate-50);
        margin: 0;
        font-family: 'Inter', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* ═══════════════════════════════════════════════
         BANDEAU TAFTECH (remplace le topbar Swagger)
         ═══════════════════════════════════════════════ */
      .swagger-ui .topbar { display: none; }

      .taftech-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: linear-gradient(120deg, #4338ca 0%, #4f46e5 45%, #7c3aed 100%);
        padding: 22px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
        box-shadow: 0 4px 24px rgba(79,70,229,0.25);
      }
      .taftech-header .brand { display: flex; align-items: center; gap: 14px; }
      .taftech-header .brand-mark {
        width: 42px; height: 42px; border-radius: 11px;
        background: rgba(255,255,255,0.16);
        border: 1px solid rgba(255,255,255,0.25);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-weight: 800; font-size: 18px; flex-shrink: 0;
      }
      .taftech-header h1 {
        margin: 0; color: #fff; font-size: 19px; font-weight: 800; letter-spacing: 0.2px;
      }
      .taftech-header p { margin: 3px 0 0; color: #e0e7ff; font-size: 12.5px; }
      .taftech-header .header-actions { display: flex; align-items: center; gap: 10px; }
      .taftech-header .env-badge {
        display: inline-flex; align-items: center; gap: 6px;
        background: rgba(16,185,129,0.18);
        border: 1px solid rgba(52,211,153,0.4);
        color: #d1fae5;
        font-size: 12px; font-weight: 600;
        padding: 6px 12px; border-radius: 999px;
      }
      .taftech-header .env-badge::before {
        content: ""; width: 7px; height: 7px; border-radius: 50%;
        background: #34d399; box-shadow: 0 0 0 3px rgba(52,211,153,0.25);
      }
      .taftech-header a.back-link {
        color: #fff; background: rgba(255,255,255,0.14);
        border: 1px solid rgba(255,255,255,0.2);
        text-decoration: none; font-size: 13px; font-weight: 600;
        padding: 9px 18px; border-radius: 9px;
        transition: background-color 150ms ease-out, transform 150ms ease-out;
      }
      .taftech-header a.back-link:hover { background: rgba(255,255,255,0.26); transform: translateY(-1px); }
      .taftech-header a.back-link:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

      /* ═══════════════════════════════════════════════
         TYPOGRAPHIE & COULEURS GLOBALES
         ═══════════════════════════════════════════════ */
      .swagger-ui, .swagger-ui .info, .swagger-ui table { font-family: 'Inter', Arial, sans-serif; }
      .swagger-ui code, .swagger-ui pre, .swagger-ui .microlight,
      .swagger-ui .model, .swagger-ui .model-title {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
      }
      .swagger-ui .wrapper { max-width: 1280px; padding: 0 40px; }

      /* ═══════════════════════════════════════════════
         SECTION INFO (titre, description, version)
         ═══════════════════════════════════════════════ */
      .swagger-ui .info { margin: 40px 0 24px; }
      .swagger-ui .info .title {
        color: var(--tt-slate-900); font-weight: 800; font-size: 30px;
      }
      .swagger-ui .info .title small.version-stamp {
        background: var(--tt-indigo); border-radius: 999px;
      }
      .swagger-ui .info .description { color: var(--tt-slate-700); font-size: 15px; line-height: 1.65; }
      .swagger-ui .info a { color: var(--tt-indigo); }
      .swagger-ui .info a:hover { color: var(--tt-indigo-dark); }

      .swagger-ui .scheme-container {
        background: #ffffff;
        box-shadow: none;
        border: 1px solid var(--tt-slate-200);
        border-radius: 12px;
        margin: 0 0 24px;
        padding: 16px 20px;
      }

      /* ═══════════════════════════════════════════════
         RECHERCHE / FILTRE
         ═══════════════════════════════════════════════ */
      .swagger-ui .filter-container { margin-bottom: 8px; }
      .swagger-ui .operation-filter-input {
        border: 1px solid var(--tt-slate-200);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
      }
      .swagger-ui .operation-filter-input:focus-visible {
        outline: 2px solid var(--tt-indigo); outline-offset: 1px; border-color: var(--tt-indigo);
      }

      /* ═══════════════════════════════════════════════
         BOUTONS
         ═══════════════════════════════════════════════ */
      .swagger-ui .btn { border-radius: 9px; font-weight: 600; transition: all 150ms ease-out; }
      .swagger-ui .btn.authorize {
        background-color: var(--tt-indigo); border-color: var(--tt-indigo); color: #fff;
      }
      .swagger-ui .btn.authorize:hover { background-color: var(--tt-indigo-dark); border-color: var(--tt-indigo-dark); }
      .swagger-ui .btn.authorize svg { fill: #fff; }
      .swagger-ui .btn.execute {
        background-color: var(--tt-indigo); border-color: var(--tt-indigo); box-shadow: none;
      }
      .swagger-ui .btn.execute:hover { background-color: var(--tt-indigo-dark); border-color: var(--tt-indigo-dark); }
      .swagger-ui .btn.cancel { color: #dc2626; border-color: #fecaca; }
      .swagger-ui .btn.try-out__btn { border-radius: 8px; border-color: var(--tt-slate-200); }

      /* ═══════════════════════════════════════════════
         GROUPES DE TAGS (sections)
         ═══════════════════════════════════════════════ */
      .swagger-ui .opblock-tag {
        border-bottom: 1px solid var(--tt-slate-200);
        color: var(--tt-slate-900);
        font-size: 18px; font-weight: 700;
        padding: 14px 0;
      }
      .swagger-ui .opblock-tag:hover { background: transparent; }
      .swagger-ui .opblock-tag small { color: var(--tt-slate-500); font-weight: 400; }
      .swagger-ui section.models { border: 1px solid var(--tt-slate-200); border-radius: 12px; }
      .swagger-ui section.models .model-container { border-radius: 8px; }

      /* ═══════════════════════════════════════════════
         CARTES D'ENDPOINT — coeur du restyle
         ═══════════════════════════════════════════════ */
      .swagger-ui .opblock {
        border-radius: 12px;
        box-shadow: 0 1px 2px rgba(15,23,42,0.04);
        border: 1px solid var(--tt-slate-200);
        margin: 0 0 12px;
        background: #ffffff;
      }
      .swagger-ui .opblock .opblock-summary {
        border: none;
        padding: 6px 14px;
      }
      .swagger-ui .opblock .opblock-summary-path,
      .swagger-ui .opblock .opblock-summary-path__deprecated {
        color: var(--tt-slate-900); font-weight: 600; font-size: 14.5px;
        font-family: 'JetBrains Mono', monospace;
      }
      .swagger-ui .opblock .opblock-summary-description { color: var(--tt-slate-500); font-size: 13.5px; }
      .swagger-ui .opblock .opblock-summary-method {
        border-radius: 7px; font-weight: 700; min-width: 84px; text-align: center;
        font-size: 12.5px; letter-spacing: 0.4px;
      }

      /* Bordure gauche colorée par méthode — repère visuel rapide */
      .swagger-ui .opblock.opblock-get { border-left: 4px solid #2563eb; background: #ffffff; }
      .swagger-ui .opblock.opblock-post { border-left: 4px solid #059669; background: #ffffff; }
      .swagger-ui .opblock.opblock-patch { border-left: 4px solid #d97706; background: #ffffff; }
      .swagger-ui .opblock.opblock-put { border-left: 4px solid #d97706; background: #ffffff; }
      .swagger-ui .opblock.opblock-delete { border-left: 4px solid #dc2626; background: #ffffff; }

      .swagger-ui .opblock.opblock-get .opblock-summary-method { background: #2563eb; }
      .swagger-ui .opblock.opblock-post .opblock-summary-method { background: #059669; }
      .swagger-ui .opblock.opblock-patch .opblock-summary-method { background: #d97706; }
      .swagger-ui .opblock.opblock-put .opblock-summary-method { background: #d97706; }
      .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: #dc2626; }

      .swagger-ui .opblock .opblock-body { background: #fbfcfe; border-top: 1px solid var(--tt-slate-200); }
      .swagger-ui .opblock-description-wrapper p,
      .swagger-ui .opblock-external-docs-wrapper p,
      .swagger-ui .opblock-title_normal p { color: var(--tt-slate-700); }

      /* ═══════════════════════════════════════════════
         PARAMÈTRES & TABLEAUX
         ═══════════════════════════════════════════════ */
      .swagger-ui table thead tr th {
        color: var(--tt-slate-500); font-size: 11.5px; text-transform: uppercase;
        letter-spacing: 0.5px; border-bottom: 1px solid var(--tt-slate-200); font-weight: 700;
      }
      .swagger-ui table tbody tr td { border-bottom: 1px solid #f1f5f9; padding: 12px 8px; }
      .swagger-ui .parameter__name { color: var(--tt-slate-900); font-weight: 600; }
      .swagger-ui .parameter__type { color: var(--tt-indigo); font-family: 'JetBrains Mono', monospace; }
      .swagger-ui .parameter__required { color: #dc2626; }
      .swagger-ui .parameters-col_description p { color: var(--tt-slate-700); }

      .swagger-ui select,
      .swagger-ui input[type=text],
      .swagger-ui input[type=password],
      .swagger-ui input[type=email],
      .swagger-ui textarea {
        border-radius: 8px;
        border-color: var(--tt-slate-200);
        font-family: 'Inter', Arial, sans-serif;
      }
      .swagger-ui select:focus-visible,
      .swagger-ui input[type=text]:focus-visible,
      .swagger-ui textarea:focus-visible,
      .swagger-ui .opblock-summary:focus-visible {
        outline: 2px solid var(--tt-indigo); outline-offset: 1px;
      }

      /* ═══════════════════════════════════════════════
         RÉPONSES
         ═══════════════════════════════════════════════ */
      .swagger-ui .responses-inner h4,
      .swagger-ui .responses-inner h5 { color: var(--tt-slate-900); font-weight: 700; }
      .swagger-ui .response-col_status { color: var(--tt-slate-900); font-weight: 700; }
      .swagger-ui .response-col_description__inner p { color: var(--tt-slate-700); }
      .swagger-ui .responses-table .response-col_status { font-family: 'JetBrains Mono', monospace; }

      /* Blocs de code (curl, réponses JSON) — fond sombre façon Stripe */
      .swagger-ui .highlight-code, .swagger-ui pre.microlight {
        background: var(--tt-slate-900) !important;
        border-radius: 10px;
      }
      .swagger-ui .microlight, .swagger-ui .highlight-code .microlight {
        color: #e2e8f0;
      }
      .swagger-ui .curl-command { background: var(--tt-slate-900); border-radius: 10px; border: none; }

      /* ═══════════════════════════════════════════════
         BADGES / MODELS
         ═══════════════════════════════════════════════ */
      .swagger-ui .model-title { color: var(--tt-slate-900); }
      .swagger-ui .prop-type { color: var(--tt-indigo); }
      .swagger-ui .prop-format { color: var(--tt-slate-500); }

      /* Scrollbar plus discrète */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
    {% endblock head %}
  </head>
  <body>
    {% block body %}
    <header class="taftech-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">T</div>
        <div>
          <h1>TafTech API</h1>
          <p>Documentation interactive — Plateforme de recrutement</p>
        </div>
      </div>
      <div class="header-actions">
        <span class="env-badge">Développement</span>
        <a class="back-link" href="/">← Retour au site</a>
      </div>
    </header>
    <div id="swagger-ui"></div>
    <script src="{{ swagger_ui_bundle }}"></script>
    <script src="{{ swagger_ui_standalone }}"></script>
    {% if script_url %}
    <script src="{{ script_url }}"></script>
    {% else %}
    <script>
    {% include template_name_js %}
    </script>
    {% endif %}
    {% endblock %}
  </body>
</html>
